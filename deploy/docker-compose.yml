version: '3.8'

services:
  # ========== 存储层 ==========
  postgres:
    image: postgres:15-alpine
    container_name: aihunter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aihunter
      POSTGRES_USER: aihunter
      POSTGRES_PASSWORD: aihunter2025
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M

  redis:
    image: redis:7-alpine
    container_name: aihunter-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 100M

  # ========== 网关层 ==========
  gateway:
    build: ../services/gateway
    container_name: aihunter-gateway
    restart: unless-stopped
    ports:
      - "0.0.0.0:3100:3100"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://aihunter:aihunter2025@postgres:5432/aihunter
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
      AUTH_TOKEN: aihunter-dev-token
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 200M

  # ========== Worker 层 ==========
  worker:
    build: ../services/worker
    container_name: aihunter-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://aihunter:aihunter2025@postgres:5432/aihunter
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      CHAINS: ETH,BSC,BASE
      RPC_URL_ETH: ${RPC_URL_ETH:-}
      RPC_URL_BSC: ${RPC_URL_BSC:-}
      RPC_URL_BASE: ${RPC_URL_BASE:-}
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 400M

  # ========== 学习 Worker（定时任务，非持续占用） ==========
  learning:
    build: ../services/learning
    container_name: aihunter-learning
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://aihunter:aihunter2025@postgres:5432/aihunter
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SCHEDULE_INTERVAL: 3600  # 每小时检查一次是否需要学习
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 200M

volumes:
  pgdata:
  redisdata:
