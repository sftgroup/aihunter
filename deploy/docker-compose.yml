services:
  frontend:
    container_name: aihunter-frontend
    depends_on:
    - gateway
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 30M
    image: nginx:alpine
    ports:
    - 0.0.0.0:3000:80
    restart: unless-stopped
    volumes:
    - ../frontend:/usr/share/nginx/html:ro
    - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  gateway:
    build: ../services/gateway
    container_name: aihunter-gateway
    depends_on:
    - postgres
    - redis
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 200M
    environment:
      AUTH_TOKEN: aihunter2025
      DATABASE_URL: postgresql://aihunter:aihunter2025@postgres:5432/aihunter
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      REDIS_URL: redis://redis:6379
    ports:
    - 0.0.0.0:3100:3100
    restart: unless-stopped
  learning:
    build: ../services/learning
    container_name: aihunter-learning
    depends_on:
    - postgres
    - redis
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 200M
    environment:
      DATABASE_URL: postgresql://aihunter:aihunter2025@postgres:5432/aihunter
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      REDIS_URL: redis://redis:6379
    restart: unless-stopped
  postgres:
    container_name: aihunter-db
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
    environment:
      POSTGRES_DB: aihunter
      POSTGRES_PASSWORD: aihunter2025
      POSTGRES_USER: aihunter
    image: postgres:15-alpine
    ports:
    - 127.0.0.1:5432:5432
    restart: unless-stopped
    volumes:
    - pgdata:/var/lib/postgresql/data
    - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
  redis:
    container_name: aihunter-redis
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 100M
    image: redis:7-alpine
    ports:
    - 127.0.0.1:6379:6379
    restart: unless-stopped
    volumes:
    - redisdata:/data
  worker:
    build: ../services/worker
    container_name: aihunter-worker
    depends_on:
    - postgres
    - redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 400M
    environment:
      CHAINS: ETH,BSC,BASE,SOL
      DATABASE_URL: postgresql://aihunter:aihunter2025@postgres:5432/aihunter
      REDIS_URL: redis://redis:6379
      RPC_URL_BASE: ${RPC_URL_BASE:-https://base-rpc.publicnode.com}
      RPC_URL_BSC: ${RPC_URL_BSC:-https://bsc-rpc.publicnode.com}
      RPC_URL_ETH: ${RPC_URL_ETH:-https://ethereum-rpc.publicnode.com}
      RPC_URL_SOL: ${RPC_URL_SOL:-https://api.mainnet-beta.solana.com}
    restart: unless-stopped
volumes:
  pgdata: {}
  redisdata: {}
