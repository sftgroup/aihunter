version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aihunter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aihunter
      POSTGRES_USER: aihunter
      POSTGRES_PASSWORD: ***
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy: { resources: { limits: { cpus: '0.5', memory: 300M } } }

  redis:
    image: redis:7-alpine
    container_name: aihunter-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redisdata:/data
    deploy: { resources: { limits: { cpus: '0.2', memory: 100M } } }

  gateway:
    build: ../services/gateway
    container_name: aihunter-gateway
    restart: unless-stopped
    ports:
      - '0.0.0.0:3100:3100'
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://aihunter:aihunter2025@postgres:5432/aihunter
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AUTH_TOKEN: ***
    depends_on: [postgres, redis]
    deploy: { resources: { limits: { cpus: '0.3', memory: 200M } } }

  worker:
    build: ../services/worker
    container_name: aihunter-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://aihunter:aihunter2025@postgres:5432/aihunter
      CHAINS: ETH,BSC,BASE
      RPC_URL_ETH: ${RPC_URL_ETH:-}
      RPC_URL_BSC: ${RPC_URL_BSC:-}
      RPC_URL_BASE: ${RPC_URL_BASE:-}
    depends_on: [postgres, redis]
    deploy: { resources: { limits: { cpus: '0.5', memory: 400M } } }

  learning:
    build: ../services/learning
    container_name: aihunter-learning
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://aihunter:aihunter2025@postgres:5432/aihunter
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SCHEDULE_INTERVAL: '3600'
    depends_on: [postgres, redis]
    deploy: { resources: { limits: { cpus: '0.3', memory: 200M } } }

  frontend:
    image: nginx:alpine
    container_name: aihunter-frontend
    restart: unless-stopped
    ports:
      - '0.0.0.0:3000:80'
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
    depends_on: [gateway]
    deploy: { resources: { limits: { cpus: '0.1', memory: 30M } } }

volumes:
  pgdata:
  redisdata:
