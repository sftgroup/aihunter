<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIHunter - 链上交易自动化引擎</title>
<style>
:root{--bg:#0b0b14;--card:#1a1a2e;--accent:#00d4aa;--danger:#ff4757;--warning:#ffa502;--text:#ececf4;--text2:#8888aa;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:sans-serif;padding:20px;max-width:1400px;margin:0 auto;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:20px}
.badge{padding:4px 12px;border-radius:100px;font-size:0.8rem;display:inline-flex;align-items:center;gap:4px}
.badge-green{background:rgba(0,212,170,.15);color:var(--accent)}
.badge-blue{background:rgba(71,130,255,.12);color:#4782ff}
.badge-yellow{background:rgba(255,165,2,.12);color:var(--warning)}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;font-size:0.9rem;cursor:pointer;background:var(--card);color:var(--text2);border:none;font-weight:500}
.tab.active{background:rgba(0,212,170,.15);color:var(--accent)}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,.05)}
.card-title{font-size:1rem;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.panel{display:none}.panel.active{display:block}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.grid-2{grid-template-columns:1fr}}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center}
.stat-num{font-size:1.6rem;font-weight:700}
.stat-num-green{color:var(--accent)}.stat-num-blue{color:#4782ff}.stat-num-yellow{color:var(--warning)}
.green{color:var(--accent)}.red{color:var(--danger)}
.signal-card{padding:14px;background:rgba(255,255,255,.02);border-radius:10px;margin-bottom:10px;border:1px solid rgba(255,255,255,.04)}
.signal-tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.chain-tag{padding:2px 10px;border-radius:100px;font-size:0.75rem}
.chain-eth{background:rgba(98,126,234,.15);color:#627eea}.chain-bsc{background:rgba(240,185,11,.15);color:#f0b90b}
.chain-base{background:rgba(0,82,255,.15);color:#0052ff}.chain-sol{background:rgba(153,69,255,.15);color:#9945ff}
.conf-score{font-size:1.1rem;font-weight:700}
.conf-high{color:var(--accent)}.conf-mid{color:var(--warning)}.conf-low{color:var(--danger)}
.flag{padding:2px 8px;border-radius:4px;font-size:0.7rem}
.flag-safe{background:rgba(0,212,170,.12);color:var(--accent)}
.flag-warn{background:rgba(255,165,2,.12);color:var(--warning)}
.flag-danger{background:rgba(255,71,87,.12);color:var(--danger)}
.trade-tag{font-size:0.7rem;padding:2px 8px;border-radius:4px}
.trade-yes{background:rgba(0,212,170,.12);color:var(--accent)}
.trade-no{background:rgba(255,71,87,.12);color:var(--danger)}
.trade-pending{background:rgba(255,165,2,.12);color:var(--warning)}
.signal-addr{font-family:monospace;font-size:0.8rem;color:var(--text2);word-break:break-all}
.signal-meta{font-size:0.8rem;color:var(--text3)}
.svc-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:0.85rem}
.svc-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
table{width:100%;border-collapse:collapse;font-size:0.8rem}
th{padding:8px;text-align:left;color:var(--text3);border-bottom:1px solid rgba(255,255,255,.06);font-weight:500}
td{padding:8px;border-bottom:1px solid rgba(255,255,255,.04)}
input,select{width:100%;padding:10px;border-radius:8px;background:var(--bg);border:1px solid rgba(255,255,255,.08);color:var(--text);font-size:0.85rem;font-family:monospace;outline:none}
input:focus{border-color:var(--accent)}
.btn{padding:8px 18px;border-radius:8px;font-size:0.85rem;cursor:pointer;border:none;background:var(--accent);color:var(--bg);font-weight:500}
.empty{text-align:center;padding:30px;color:var(--text2)}
.key-item{display:flex;justify-content:space-between;padding:8px 12px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:0.8rem}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="logo-icon">🏹</div><div><h1>AIHunter</h1></div></div>
  <div><span id="connBadge" class="badge badge-green">● WebSocket</span> <span id="signalBadge" class="badge badge-blue">0 信号</span></div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('signals')">📡 信号</button>
  <button class="tab" onclick="switchTab('trades')">💼 交易</button>
  <button class="tab" onclick="switchTab('config')">🔑 配置</button>
  <button class="tab" onclick="switchTab('system')">⚙️ 系统</button>
</div>

<!-- ===== 信号 ===== -->
<div id="panel-signals" class="panel active">
  <div class="card">
    <div class="card-title">📡 实时信号 <span id="wsStatus" style="font-size:0.8rem;color:var(--warning)">● 连接中</span></div>
    <div id="signalList"><div class="empty"><p>正在监听...</p></div></div>
  </div>
</div>

<!-- ===== 交易 ===== -->
<div id="panel-trades" class="panel">
  <div class="stat-row">
    <div class="stat-card"><div class="stat-num stat-num-green" id="paperBalance">$10,000</div><div>模拟余额</div></div>
    <div class="stat-card"><div class="stat-num" id="paperTotalPnl" style="color:#888">$0.00</div><div>模拟盈亏</div></div>
    <div class="stat-card"><div class="stat-num stat-num-blue" id="paperWinRate">0%</div><div>模拟胜率</div></div>
    <div class="stat-card"><div class="stat-num" id="paperTotalTrades">0</div><div>模拟交易</div></div>
  </div>
  <div style="margin-bottom:12px">
    <button class="tab active" onclick="switchTradeTab('paper')">🧪 模拟交易</button>
    <button class="tab" onclick="switchTradeTab('real')">💰 真实交易</button>
  </div>
  <div id="trade-paper" class="panel active">
    <div class="grid-2">
      <div class="card"><div class="card-title">📈 当前持仓</div><div id="openPositions"><div class="empty"><p>暂无</p></div></div></div>
      <div class="card"><div class="card-title">📜 交易记录</div><div id="closedTrades"><div class="empty"><p>暂无</p></div></div></div>
    </div>
  </div>
  <div id="trade-real" class="panel">
    <div class="card">
      <div class="card-title">💰 真实交易</div>
      <div class="empty">
        <p>🔑 配置 SessionKey 后可开启实盘交易</p>
        <p style="font-size:0.8rem;color:var(--text2);margin-top:8px">SessionKey 用于免逐笔签名，限额可控，可随时撤销</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== 配置 ===== -->
<div id="panel-config" class="panel">
  <div class="grid-2">
    <div class="card">
      <div class="card-title">🤖 AI 供应商</div>
      <div id="aiConfigStatus"></div>
      <div style="margin:12px 0">
        <div style="font-size:0.8rem;color:var(--text2);margin-bottom:4px">供应商</div>
        <select id="aiProvider">
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI</option>
          <option value="moonshot">Moonshot</option>
          <option value="claude">Claude</option>
          <option value="groq">Groq</option>
        </select>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:0.8rem;color:var(--text2);margin-bottom:4px">API Key</div>
        <input id="aiApiKey" placeholder="sk-..." />
      </div>
      <button class="btn" onclick="saveAi()">💾 保存</button>
      <span id="aiResult" style="margin-left:8px;font-size:0.8rem"></span>
    </div>
    <div class="card">
      <div class="card-title">🔗 RPC 节点</div>
      <div id="rpcList"></div>
      <div style="margin:12px 0;display:flex;gap:8px;flex-wrap:wrap">
        <select id="rpcChain" style="width:auto">
          <option value="ETH">ETH</option>
          <option value="BSC">BSC</option>
          <option value="BASE">BASE</option>
          <option value="SOL">SOL</option>
        </select>
        <input id="rpcUrl" style="flex:1;min-width:150px" placeholder="https://..." />
        <button class="btn" onclick="addRpc()">➕</button>
      </div>
      <span id="rpcResult" style="font-size:0.8rem"></span>
    </div>
  </div>
</div>

<!-- ===== 系统 ===== -->
<div id="panel-system" class="panel">
  <div class="card">
    <div class="card-title">🖥️ 服务状态</div>
    <div id="statusList"></div>
  </div>
  <div class="card">
    <div class="card-title">📊 统计数据</div>
    <div class="grid-2">
      <div>事件: <b id="totalEvents">-</b></div>
      <div>待处理: <b id="pendingEvents">-</b></div>
      <div>持仓: <b id="openPosCount">-</b></div>
      <div>模拟盈亏: <b id="paperPnl">-</b></div>
      <div>RPC: <b id="rpcStatus">-</b></div>
      <div>经验: <b id="recentExps">-</b></div>
    </div>
  </div>
</div>

<script>
var API = window.location.origin + '/api';
var signals = [];
var ws = null;

function switchTab(name) {
  var tabs = document.querySelectorAll('.tab-bar > .tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  var map = {signals:0, trades:1, config:2, system:3};
  tabs[map[name]].classList.add('active');
  ['signals','trades','config','system'].forEach(function(p){
    var el = document.getElementById('panel-'+p);
    if (el) el.className = p === name ? 'panel active' : 'panel';
  });
  if (name === 'trades') loadTrades();
  if (name === 'config') loadConfig();
  if (name === 'system') loadSystem();
}

function switchTradeTab(name) {
  var btns = document.querySelectorAll('#panel-trades .tab-bar ~ .tab');
  // 实际用父级选择
  var parent = document.getElementById('panel-trades');
  var tabs = parent.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  // 找到对应按钮
  for (var j = 0; j < tabs.length; j++) {
    if (name === 'paper' && tabs[j].textContent.indexOf('模拟') >= 0) tabs[j].classList.add('active');
    if (name === 'real' && tabs[j].textContent.indexOf('真实') >= 0) tabs[j].classList.add('active');
  }
  var p1 = document.getElementById('trade-paper');
  var p2 = document.getElementById('trade-real');
  if (p1) p1.className = name === 'paper' ? 'panel active' : 'panel';
  if (p2) p2.className = name === 'real' ? 'panel active' : 'panel';
}

function connectWS() {
  var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + window.location.host + '/ws');
  ws.onopen = function() {
    document.getElementById('wsStatus').innerHTML = '● <span style="color:var(--accent)">已连接</span>';
    document.getElementById('connBadge').className = 'badge badge-green';
    document.getElementById('connBadge').textContent = '● WebSocket 已连接';
  };
  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      if (msg.type === 'signal' && msg.data) {
        var d = msg.data;
        var key = d.chain + '_' + (d.contract || d.symbol || '');
        var found = false;
        for (var k = 0; k < signals.length; k++) {
          if (signals[k]._key === key) { found = true; break; }
        }
        if (!found) {
          d._key = key;
          d._time = new Date().getTime();
          signals.unshift(d);
          if (signals.length > 50) signals.pop();
          renderSignals();
          document.getElementById('signalBadge').textContent = signals.length + ' 信号';
        }
      }
    } catch(e) {}
  };
  ws.onclose = function() {
    document.getElementById('wsStatus').innerHTML = '● <span style="color:var(--danger)">断开</span>';
    document.getElementById('connBadge').className = 'badge badge-blue';
    document.getElementById('connBadge').textContent = '● 断开';
    setTimeout(connectWS, 3000);
  };
  ws.onerror = function() { ws.close(); };
}

function renderSignals() {
  if (signals.length === 0) return;
  var cc = {ETH:'chain-eth', BSC:'chain-bsc', BASE:'chain-base', SOL:'chain-sol'};
  var html = '';
  for (var i = 0; i < signals.length; i++) {
    var s = signals[i];
    var c = s.confidence || 50;
    var cx = c >= 60 ? 'conf-high' : (c >= 40 ? 'conf-mid' : 'conf-low');
    
    // 标记
    var fl = '';
    if (s.flags) {
      for (var f = 0; f < s.flags.length; f++) {
        var safe = ['owner_renounced','lp_locked','no_mint','tax_low'].indexOf(s.flags[f]) >= 0;
        var danger = ['mintable','owner_active','lp_unlocked','tax_high'].indexOf(s.flags[f]) >= 0;
        var cls = safe ? 'flag-safe' : (danger ? 'flag-danger' : 'flag-warn');
        var ico = safe ? '✅' : (danger ? '🔴' : '⚠️');
        fl += '<span class="flag ' + cls + '">' + ico + ' ' + s.flags[f].replace(/_/g,' ') + '</span>';
      }
    }
    
    // 模拟交易状态
    var pt = s.paper_trade || 'pending';
    var ptCls = pt === 'yes' ? 'trade-yes' : (pt === 'no' ? 'trade-no' : 'trade-pending');
    var ptTxt = pt === 'yes' ? '✅ 已买入' : (pt === 'no' ? '⛔ 跳过' : '⏳ 待判断');
    var ptReason = s.paper_reason || '';
    if (ptReason) ptTxt += ' · ' + ptReason;
    
    html += '<div class="signal-card">';
    html += '<div class="signal-tags"><span class="chain-tag ' + (cc[s.chain] || 'chain-eth') + '">' + (s.chain || '?') + '</span><span class="conf-score ' + cx + '">' + c + '%</span><span class="signal-meta">' + (s.time ? new Date(s.time).toLocaleTimeString() : '') + '</span></div>';
    html += '<div class="signal-addr">' + (s.contract || s.symbol || '?') + '</div>';
    if (fl) html += '<div style="margin-top:4px">' + fl + '</div>';
    html += '<div style="margin-top:6px"><span class="trade-tag ' + ptCls + '">🧪 ' + ptTxt + '</span></div>';
    html += '</div>';
  }
  document.getElementById('signalList').innerHTML = html;
}

function loadTrades() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + '/trade/portfolio?userId=paper', true);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.code !== 200) return;
      var p = d.data;
      document.getElementById('paperBalance').textContent = '$' + p.balance.toFixed(2);
      var pnl = parseFloat(p.stats.totalPnl);
      document.getElementById('paperTotalPnl').textContent = (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2);
      document.getElementById('paperTotalPnl').style.color = pnl >= 0 ? 'var(--accent)' : 'var(--danger)';
      document.getElementById('paperWinRate').textContent = p.stats.winRate;
      document.getElementById('paperTotalTrades').textContent = p.stats.totalTrades;
      
      var ops = p.openPositions || [];
      if (ops.length === 0) {
        document.getElementById('openPositions').innerHTML = '<div class="empty"><p>暂无持仓</p></div>';
      } else {
        var h = '<table><tr><th>链</th><th>代币</th><th>金额</th><th>信心</th><th>滑点</th></tr>';
        for (var i = 0; i < ops.length; i++) {
          h += '<tr><td>' + ops[i].chain + '</td><td>' + (ops[i].symbol || '').slice(0,14) + '</td><td>$' + ops[i].amount_usd + '</td><td>' + ops[i].confidence + '%</td><td>' + ops[i].price_impact + '%</td></tr>';
        }
        h += '</table>';
        document.getElementById('openPositions').innerHTML = h;
      }
      
      var cls = p.closedTrades || [];
      if (cls.length === 0) {
        document.getElementById('closedTrades').innerHTML = '<div class="empty"><p>暂无记录</p></div>';
      } else {
        var h2 = '<table><tr><th>代币</th><th>盈亏</th><th>收益率</th></tr>';
        var limit = cls.length > 30 ? 30 : cls.length;
        for (var j = 0; j < limit; j++) {
          var pnl2 = parseFloat(cls[j].pnl_pct);
          h2 += '<tr><td>' + (cls[j].symbol || '').slice(0,14) + '</td><td class="' + (pnl2 >= 0 ? 'green' : 'red') + '">' + (pnl2 >= 0 ? '+' : '') + '$' + parseFloat(cls[j].pnl_usd || 0).toFixed(2) + '</td><td class="' + (pnl2 >= 0 ? 'green' : 'red') + '">' + (pnl2 >= 0 ? '+' : '') + pnl2.toFixed(2) + '%</td></tr>';
        }
        h2 += '</table>';
        document.getElementById('closedTrades').innerHTML = h2;
      }
    } catch(e) {}
  };
  xhr.send();
}

function loadSystem() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + '/system/status', true);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.code !== 200) return;
      var s = d.data;
      var svcs = [
        {i:'🚪',l:'Gateway',st:s.gateway?.status||'unknown'},
        {i:'🗄️',l:'Redis',st:s.redis?.status||'unknown'},
        {i:'🐘',l:'PostgreSQL',st:s.postgresql?.status||'unknown'},
        {i:'⚙️',l:'EVM Worker',st:s.evm_worker?.status||'idle'},
        {i:'🟣',l:'SOL Worker',st:s.sol_worker?.status||'idle'}
      ];
      var cl = {healthy:'#00d4aa',idle:'#ffa502',down:'#ff4757'};
      var tx = {healthy:'正常',idle:'空闲',down:'异常'};
      var h = '';
      for (var i = 0; i < svcs.length; i++) {
        h += '<div class="svc-row"><span>' + svcs[i].i + ' ' + svcs[i].l + '</span><span><span class="svc-dot" style="background:' + (cl[svcs[i].st] || '#888') + '"></span>' + (tx[svcs[i].st] || svcs[i].st) + '</span></div>';
      }
      document.getElementById('statusList').innerHTML = h;
      document.getElementById('totalEvents').textContent = s.total_events || 0;
      document.getElementById('pendingEvents').textContent = s.pending_events || 0;
      document.getElementById('openPosCount').textContent = s.open_positions || 0;
      var pp = parseFloat(s.paper_pnl || 0);
      document.getElementById('paperPnl').textContent = (pp >= 0 ? '+' : '') + '$' + pp.toFixed(2);
      document.getElementById('paperPnl').style.color = pp >= 0 ? 'var(--accent)' : 'var(--danger)';
      document.getElementById('recentExps').textContent = s.recent_experiences || 0;
      if (s.chain_count) {
        document.getElementById('rpcStatus').textContent = (s.chain_online || 0) + '/' + s.chain_count + ' 在线';
        document.getElementById('rpcStatus').style.color = s.chain_online === s.chain_count ? 'var(--accent)' : 'var(--warning)';
      }
    } catch(e) {}
  };
  xhr.send();
}

function loadConfig() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + '/config/ai', true);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.code !== 200) return;
      var ai = d.data || {};
      document.getElementById('aiApiKey').value = ai['ai.api_key'] || '';
      document.getElementById('aiProvider').value = ai['ai.provider'] || 'deepseek';
      document.getElementById('aiConfigStatus').innerHTML = '<div class="key-item"><span>' + (ai['ai.provider'] || '未设置') + '</span><span class="badge ' + (ai['ai.api_key'] ? 'badge-green' : '') + '">' + (ai['ai.api_key'] ? '已配置' : '未配置') + '</span></div>';
    } catch(e) {}
  };
  xhr.send();
  
  var xhr2 = new XMLHttpRequest();
  xhr2.open('GET', API + '/config/rpc', true);
  xhr2.onload = function() {
    try {
      var d2 = JSON.parse(xhr2.responseText);
      var rpcs = d2.data || {};
      var h = '';
      for (var key in rpcs) {
        var urls = [];
        try { urls = JSON.parse(rpcs[key]); } catch(e) { urls = [rpcs[key]]; }
        for (var i = 0; i < urls.length; i++) {
          h += '<div class="key-item"><span>' + key.replace('rpc.','') + '</span><span style="color:var(--text2);font-size:0.75rem">' + urls[i].slice(0,45) + '</span><span class="badge badge-green">已配置</span></div>';
        }
      }
      document.getElementById('rpcList').innerHTML = h || '<div style="color:var(--text2);padding:8px">默认节点</div>';
    } catch(e) {}
  };
  xhr2.send();
}

function saveAi() {
  var p = document.getElementById('aiProvider').value;
  var k = document.getElementById('aiApiKey').value.trim();
  if (!k) { document.getElementById('aiResult').textContent = '请输入 Key'; return; }
  document.getElementById('aiResult').textContent = '保存中...';
  var xhr = new XMLHttpRequest();
  xhr.open('POST', API + '/config/ai', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    var d = JSON.parse(xhr.responseText);
    document.getElementById('aiResult').textContent = d.code === 200 ? '✅ 已保存' : '❌ ' + d.error;
    document.getElementById('aiResult').style.color = d.code === 200 ? 'var(--accent)' : 'var(--danger)';
    if (d.code === 200) loadConfig();
  };
  xhr.send(JSON.stringify({provider:p, apiKey:k}));
}

function addRpc() {
  var c = document.getElementById('rpcChain').value;
  var u = document.getElementById('rpcUrl').value.trim();
  if (!u) { document.getElementById('rpcResult').textContent = '请输入 URL'; return; }
  var xhr = new XMLHttpRequest();
  xhr.open('POST', API + '/config/rpc', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    var d = JSON.parse(xhr.responseText);
    document.getElementById('rpcResult').textContent = d.code === 200 ? '✅ 已添加' : '❌ ' + d.error;
    document.getElementById('rpcResult').style.color = d.code === 200 ? 'var(--accent)' : 'var(--danger)';
    if (d.code === 200) loadConfig();
  };
  xhr.send(JSON.stringify({chain:c, url:u}));
}

connectWS();
loadSystem();
setInterval(loadSystem, 5000);
setInterval(loadTrades, 10000);
</script>
</body>
</html>
