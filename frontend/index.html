<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIHunter - 链上交易自动化引擎</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--hover:#252540;--accent:#00d4aa;--danger:#ff4757;--warning:#ffa502;--text1:#e8e8f0;--text2:#8888a0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:16px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px}
.logo h1{font-size:20px}.logo p{font-size:12px;color:var(--text2)}
.status-bar{display:flex;align-items:center;gap:12px}
.badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:rgba(0,212,170,.15);color:var(--accent)}
.badge-yellow{background:rgba(255,165,2,.15);color:var(--warning)}
.badge-red{background:rgba(255,71,87,.15);color:var(--danger)}
.grid{display:grid;gap:16px}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.grid-main{display:grid;grid-template-columns:1fr 360px;gap:16px}
@media(max-width:1024px){.grid-main{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;transition:.2s}
.card:hover{border-color:rgba(0,212,170,.2)}
.card h2{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.stat-value{font-size:28px;font-weight:700;margin:4px 0}
.stat-label{font-size:12px;color:var(--text2)}
.signal{padding:12px;border-radius:8px;background:var(--bg);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.2s}
.signal:hover{background:var(--hover)}
.signal-left{display:flex;align-items:center;gap:12px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--accent)}.dot-yellow{background:var(--warning)}.dot-red{background:var(--danger)}
.chain-badge{font-size:10px;padding:2px 8px;border-radius:12px;background:rgba(0,212,170,.15);color:var(--accent)}
.score{font-weight:700;font-size:14px}
.score-green{color:var(--accent)}.score-yellow{color:var(--warning)}.score-red{color:var(--danger)}
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.row:last-child{border:none}
.row-label{font-size:13px;color:var(--text2)}
.row-value{font-size:13px;display:flex;align-items:center;gap:8px}
.row-dot{width:6px;height:6px;border-radius:50%}
.footer{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)}
.resource{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--text2);border:none;transition:.2s}
.tab:hover{background:var(--hover)}
.tab.active{background:var(--accent);color:var(--bg);font-weight:600}
.link{color:var(--accent);cursor:pointer;font-size:12px}
.link:hover{text-decoration:underline}
.flag-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,.06);margin-right:4px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">🏹</div>
    <div><h1>AIHunter</h1><p>链上交易自动化引擎 · V1.0-MVP</p></div>
  </div>
  <div class="status-bar">
    <span id="connBadge" class="badge badge-green">● 运行中</span>
    <span id="signalBadge" class="badge" style="background:rgba(136,136,160,.15);color:var(--text2)">0 信号</span>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('signals',this)">📡 实时信号</button>
  <button class="tab" onclick="switchTab('session',this)">🔑 SessionKey</button>
</div>

<!-- 信号面板 -->
<div id="panel-signals">
  <div class="grid grid-3" style="margin-bottom:20px">
    <div class="card"><div class="stat-label">📡 今日信号</div><div class="stat-value" id="signalCount">0</div><div class="stat-label" id="signalSub">等待链上事件...</div></div>
    <div class="card"><div class="stat-label">⚡ 活跃策略</div><div class="stat-value">4</div><div class="stat-label">狙击/反貔貅/跟单/巨鲸</div></div>
    <div class="card"><div class="stat-label">🧠 经验记录</div><div class="stat-value" id="expCount">0</div><div class="stat-label" id="expSub">最近24h</div></div>
  </div>

  <div class="grid-main">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card">
        <h2>📡 实时交易信号 <span style="font-size:11px;font-weight:400;color:var(--text2)"><span id="wsStatus">WebSocket 连接中...</span></span></h2>
        <div id="signalList">
          <div class="empty-state">
            <div style="font-size:40px;margin-bottom:12px">📡</div>
            <p>等待链上事件...</p>
            <p style="margin-top:8px;font-size:12px">Worker 正在扫描 ETH/BSC/BASE 链</p>
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card"><h2>🖥️ 系统状态</h2><div id="statusList"><p style="font-size:13px;color:var(--text2)">加载中...</p></div><div class="footer"><div class="resource"><span id="eventCount"></span><span id="pendingCount"></span></div></div></div>
    </div>
  </div>
</div>

<!-- SessionKey 面板 -->
<div id="panel-session" style="display:none">
  <div class="card" style="max-width:500px">
    <h2>🔑 SessionKey 管理</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">创建免签交易授权（24小时有效）</p>
    <div style="display:flex;flex-direction:column;gap:12px">
      <input id="addrInput" placeholder="输入钱包地址 0x..." style="padding:10px;border-radius:8px;background:var(--bg);border:1px solid rgba(255,255,255,.1);color:var(--text1);font-size:14px;outline:none">
      <button class="tab active" style="text-align:center;width:100%" onclick="createSession()">创建 SessionKey</button>
      <div id="sessionResult" style="font-size:13px;color:var(--text2);margin-top:8px"></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';

// ===== WebSocket 连接 =====
let signals = [];
let ws = null;

function connectWS() {
  const wsUrl = "ws://" + window.location.hostname + ":3100/ws";
  ws = new WebSocket(wsUrl);
  
  ws.onopen = () => {
    document.getElementById('wsStatus').textContent = 'WebSocket 已连接';
    document.getElementById('wsStatus').style.color = 'var(--accent)';
  };
  
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'signal' && msg.data) {
        // 新信号
        signals.unshift(msg.data);
        if (signals.length > 50) signals.pop();
        renderSignals();
        updateStats();
      }
    } catch(err) {}
  };
  
  ws.onclose = () => {
    document.getElementById('wsStatus').textContent = 'WebSocket 断开 (重连中...)';
    document.getElementById('wsStatus').style.color = 'var(--danger)';
    setTimeout(connectWS, 3000);
  };
  
  ws.onerror = () => ws.close();
}

// ===== API 调用 =====
async function fetchSystemStatus() {
  try {
    const r = await fetch(API + '/system/status');
    if (!r.ok) throw new Error('API 不可用');
    const data = await r.json();
    if (data.code === 200) renderStatus(data.data);
  } catch(e) {
    document.getElementById('statusList').innerHTML = '<div class="row"><span class="row-label">API</span><span class="row-value" style="color:var(--danger)">无法连接</span></div>';
  }
}

function renderStatus(data) {
  if (!data) return;
  
  const services = [
    {label:'Gateway', status: data.gateway?.status || 'unknown'},
    {label:'Redis', status: data.redis?.status || 'unknown'},
    {label:'PostgreSQL', status: data.postgresql?.status || 'unknown'},
  ];
  
  const statusColors = {healthy:'#00d4aa', down:'#ff4757', unknown:'#8888a0'};
  const statusText = {healthy:'正常', down:'异常', unknown:'未知'};
  
  document.getElementById('statusList').innerHTML = services.map(s=>
    '<div class="row"><span class="row-label">'+s.label+'</span><span class="row-value"><span class="row-dot" style="background:'+(statusColors[s.status]||'#888')+'"></span>'+(statusText[s.status]||s.status)+'</span></div>'
  ).join('');
  
  document.getElementById('eventCount').textContent = '总事件: ' + (data.total_events || 0);
  document.getElementById('pendingCount').textContent = '待处理: ' + (data.pending_events || 0);
  
  document.getElementById('expCount').textContent = data.recent_experiences || 0;
  document.getElementById('expSub').textContent = '最近24h';
  document.getElementById('signalCount').textContent = signals.length;
  document.getElementById('signalSub').textContent = signals.filter(s=>s.risk_level==='low').length+'个低风险';
  
  document.getElementById('signalBadge').textContent = signals.length + ' 信号';
}

function renderSignals() {
  if (signals.length === 0) {
    document.getElementById('signalList').innerHTML = '<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">📡</div><p>等待链上事件...</p></div>';
    return;
  }
  
  document.getElementById('signalList').innerHTML = signals.map(s=>{
    const dc = s.risk_level==='low'?'dot-green':s.risk_level==='medium'?'dot-yellow':'dot-red';
    const sc = (s.confidence||50) >= 60?'score-green':(s.confidence||50) >= 40?'score-yellow':'score-red';
    const flags = (s.flags||[]).map(f=>'<span class="flag-tag">'+f+'</span>').join('');
    
    return '<div class="signal"><div class="signal-left"><span class="dot '+dc+'"></span><div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span class="chain-badge">'+(s.chain||'?')+'</span><span style="font-size:13px;font-family:monospace">'+(s.symbol||s.contract||'?')+'</span>'+flags+'</div><div style="font-size:12px;color:var(--text2);margin-top:2px">'+(s.type||'事件')+' · '+(s.contract||'')+' · '+(s.time?new Date(s.time).toLocaleTimeString():'')+'</div></div></div><div style="text-align:right"><div class="score '+sc+'">'+(s.confidence||'?')+'%</div><div style="font-size:10px;color:var(--text2)">信心分</div></div></div>';
  }).join('');
}

function updateStats() {
  document.getElementById('signalCount').textContent = signals.length;
  document.getElementById('signalSub').textContent = signals.filter(s=>s.risk_level==='low').length+'个低风险';
  document.getElementById('signalBadge').textContent = signals.length + ' 信号';
}

// ===== Tab 切换 =====
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['signals','session'].forEach(p=>{
    document.getElementById('panel-'+p).style.display = p===name?'block':'none';
  });
}

// ===== SessionKey =====
async function createSession(){
  const addr = document.getElementById('addrInput').value.trim();
  if(!addr){document.getElementById('sessionResult').textContent='⚠️ 请输入地址';return}
  try{
    document.getElementById('sessionResult').textContent='创建中...';
    const r=await fetch(API+'/session/create',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer…2025'},
      body:JSON.stringify({address:addr,permissions:{maxTrade:5,maxAmount:1000}})
    });
    const d=await r.json();
    if(d.code===200){
      document.getElementById('sessionResult').innerHTML='✅ 创建成功<br><code style="color:var(--accent);font-size:12px;word-break:break-all">'+d.data.sessionKey+'</code><br>⏱️ 有效期: '+d.data.expiresIn;
    } else {
      document.getElementById('sessionResult').textContent='❌ '+d.error;
    }
  }catch(e){
    document.getElementById('sessionResult').textContent='❌ 连接失败: '+e.message;
  }
}

// ===== 初始化 =====
connectWS();
fetchSystemStatus();
setInterval(fetchSystemStatus, 10000); // 每10秒刷新状态
</script>
</body>
</html>
